<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Scorecard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }
        .header {
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 1.25rem;
            color: #1a1a1a;
            text-decoration: none;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: #FFE14D;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a1a;
        }
        .nav-links {
            display: flex;
            gap: 1rem;
        }
        .nav-links a {
            color: #666;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            background: #f8f9fa;
            color: #1a1a1a;
        }
        .nav-links a.active {
            background: #FFE14D;
            color: #1a1a1a;
        }
        .hero {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid #e8e8e8;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }
        .hero p {
            color: #666;
            font-size: 1rem;
        }
        .last-updated {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .container {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
            text-align: center;
        }
        .summary-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .summary-card .label {
            color: #666;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
        .legend {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
        }
        .team-section {
            margin-bottom: 3rem;
        }
        .team-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .team-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .peacock .team-badge { background: #667eea; }
        .pterodactyl .team-badge { background: #f5576c; }
        .billing .team-badge { background: #4facfe; }
        .pillar-section {
            margin-bottom: 1.5rem;
        }
        .pillar-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: #e9ecef;
            border-radius: 6px;
        }
        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e8e8e8;
            font-size: 0.85rem;
        }
        .scorecard-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            background: #f8f9fa;
            border-bottom: 2px solid #e8e8e8;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
        }
        .scorecard-table th.check-col {
            text-align: center;
            min-width: 80px;
            max-width: 120px;
        }
        .scorecard-table td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        .scorecard-table tr:hover {
            background: #fafafa;
        }
        .scorecard-table tr:last-child td {
            border-bottom: none;
        }
        .service-name {
            font-weight: 600;
            color: #1a1a1a;
            white-space: nowrap;
        }
        .service-name a {
            color: inherit;
            text-decoration: none;
        }
        .service-name a:hover {
            color: #667eea;
        }
        .status-cell {
            text-align: center;
        }
        .status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status.pass {
            background: #d4edda;
            color: #155724;
        }
        .status.fail {
            background: #f8d7da;
            color: #721c24;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
        }
        .status.unknown {
            background: #e9ecef;
            color: #6c757d;
        }
        .status.dx_metric {
            background: #cce5ff;
            color: #004085;
        }
        .status.na {
            background: #f8f9fa;
            color: #adb5bd;
        }
        .check-header {
            font-size: 0.65rem;
            line-height: 1.2;
        }
        .priority-badge {
            display: inline-block;
            font-size: 0.55rem;
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            margin-top: 2px;
        }
        .priority-badge.p1 { background: #f8d7da; color: #721c24; }
        .priority-badge.p2 { background: #fff3cd; color: #856404; }
        .priority-badge.p3 { background: #e9ecef; color: #6c757d; }
        .pillar-row {
            background: #f8f9fa !important;
        }
        .pillar-row td {
            font-weight: 600;
            color: #495057;
            padding: 0.5rem 0.75rem !important;
        }
        @media (max-width: 1200px) {
            .scorecard-table {
                font-size: 0.75rem;
            }
            .scorecard-table th, .scorecard-table td {
                padding: 0.4rem 0.5rem;
            }
            .status {
                width: 22px;
                height: 22px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">Z</div>
            Team Directory
        </a>
        <nav class="nav-links">
            <a href="index.html">Teams</a>
            <a href="scorecard.html" class="active">Scorecard</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Q2 Infrastructure Scorecard</h1>
        <p>21 Production Standards checks across 4 pillars</p>
        <div class="last-updated" id="lastUpdated">Last updated: Never</div>
    </section>

    <main class="container">
        <div class="legend">
            <div class="legend-item"><span class="status pass">&#10003;</span> Passing</div>
            <div class="legend-item"><span class="status warning">!</span> In Progress</div>
            <div class="legend-item"><span class="status fail">&#10007;</span> Gap</div>
            <div class="legend-item"><span class="status dx_metric">&#9670;</span> DX/Roadie Metric</div>
            <div class="legend-item"><span class="status unknown">?</span> Unknown</div>
        </div>

        <div class="summary-cards" id="summaryCards">
            <div class="summary-card">
                <div class="value" id="totalServices">0</div>
                <div class="label">Services</div>
            </div>
            <div class="summary-card">
                <div class="value" id="totalChecks">0</div>
                <div class="label">Total Checks</div>
            </div>
            <div class="summary-card">
                <div class="value" id="totalPassing">0%</div>
                <div class="label">Actionable Passing</div>
            </div>
            <div class="summary-card">
                <div class="value" id="totalGaps">0</div>
                <div class="label">Gaps</div>
            </div>
            <div class="summary-card">
                <div class="value" id="dxMetrics">0</div>
                <div class="label">DX Metrics</div>
            </div>
        </div>

        <div id="scorecardContent">
            <!-- Populated by JavaScript -->
        </div>
    </main>

    <script>
        const pillars = [
            { id: 'Deployment Safety', checks: ['blueGreen', 'sloGate', 'prSize', 'changeFailureRate', 'rollbackTime', 'deployPipeline'] },
            { id: 'Code Quality', checks: ['coverage', 'complexity', 'methodSize', 'mutedTests', 'testFailureRate', 'eol'] },
            { id: 'Observability', checks: ['slo', 'burnRate', 'smokeTests', 'sentry', 'incidentMetric'] },
            { id: 'Tooling', checks: ['deployable', 'plinth', 'cdkNoAnsible', 'pagerduty'] }
        ];

        function getStatusIcon(status) {
            switch(status) {
                case 'pass': return '&#10003;';
                case 'fail': return '&#10007;';
                case 'warning': return '!';
                case 'dx_metric': return '&#9670;';
                case 'na': return '-';
                default: return '?';
            }
        }

        function renderScorecard(data) {
            if (data.lastUpdated) {
                document.getElementById('lastUpdated').textContent =
                    'Last updated: ' + new Date(data.lastUpdated).toLocaleString();
            }

            let totalServices = 0;
            let totalChecks = 0;
            let passingChecks = 0;
            let gaps = 0;
            let dxMetrics = 0;

            const container = document.getElementById('scorecardContent');
            container.innerHTML = '';

            for (const [teamId, team] of Object.entries(data.teams)) {
                totalServices += team.services.length;

                const section = document.createElement('section');
                section.className = `team-section ${teamId}`;

                let tableHtml = `
                    <h2 class="team-title"><span class="team-badge"></span>${team.name}</h2>
                    <table class="scorecard-table">
                        <thead>
                            <tr>
                                <th style="min-width: 180px;">Service</th>
                `;

                // Build headers by pillar
                for (const pillar of pillars) {
                    for (const checkId of pillar.checks) {
                        const check = data.checkDefinitions[checkId];
                        if (!check) continue;
                        const priority = check.priority || '';
                        const priorityClass = priority.toLowerCase();
                        tableHtml += `
                            <th class="check-col" title="${check.tier1 || ''}">
                                <div class="check-header">${check.name}</div>
                                <span class="priority-badge ${priorityClass}">${priority}</span>
                            </th>`;
                    }
                }

                tableHtml += `
                            </tr>
                        </thead>
                        <tbody>
                `;

                for (const service of team.services) {
                    tableHtml += `
                        <tr>
                            <td class="service-name">
                                <a href="https://github.com/zocdoc/${service.repo}" target="_blank">${service.name}</a>
                            </td>
                    `;

                    for (const pillar of pillars) {
                        for (const checkId of pillar.checks) {
                            const check = service.checks?.[checkId];
                            const status = check?.status || 'unknown';
                            totalChecks++;

                            if (status === 'pass') passingChecks++;
                            if (status === 'fail') gaps++;
                            if (status === 'dx_metric') dxMetrics++;

                            let tooltip = check?.notes || '';
                            if (checkId === 'coverage' && check?.value !== null && check?.value !== undefined) {
                                tooltip = `${check.value}% (target: ${check.target}%)`;
                            }

                            tableHtml += `
                                <td class="status-cell">
                                    <span class="status ${status}" title="${tooltip}">${getStatusIcon(status)}</span>
                                </td>
                            `;
                        }
                    }

                    tableHtml += '</tr>';
                }

                tableHtml += '</tbody></table>';
                section.innerHTML = tableHtml;
                container.appendChild(section);
            }

            document.getElementById('totalServices').textContent = totalServices;
            document.getElementById('totalChecks').textContent = totalChecks;
            const actionable = totalChecks - dxMetrics;
            document.getElementById('totalPassing').textContent =
                actionable > 0 ? Math.round((passingChecks / actionable) * 100) + '%' : '0%';
            document.getElementById('totalGaps').textContent = gaps;
            document.getElementById('dxMetrics').textContent = dxMetrics;
        }

        fetch('scorecard/data.json')
            .then(response => response.json())
            .then(data => renderScorecard(data))
            .catch(error => {
                console.error('Error loading scorecard data:', error);
                document.getElementById('scorecardContent').innerHTML =
                    '<p style="text-align: center; color: #666; padding: 2rem;">Error loading scorecard data. Run <code>python3 scripts/build-scorecard.py</code> to generate data.</p>';
            });
    </script>
</body>
</html>
