name: Refresh Scorecard Data

on:
  schedule:
    # Run daily at 9am UTC (5am ET)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      skip_teamcity:
        description: 'Skip TeamCity coverage fetch'
        required: false
        default: 'false'
        type: boolean
      skip_scorecard:
        description: 'Skip scorecard build'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  refresh-teamcity-coverage:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_teamcity != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch TeamCity coverage data
        env:
          TEAMCITY_TOKEN: ${{ secrets.TEAMCITY_TOKEN }}
          TEAMCITY_URL: https://teamcity.east.zocdoccloud.net
        run: |
          chmod +x scripts/fetch-teamcity-coverage.sh
          ./scripts/fetch-teamcity-coverage.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scorecard/teamcity-coverage.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scorecard/teamcity-coverage.json
          git commit -m "chore: refresh TeamCity coverage data

          Generated with AI

          Co-Authored-By: Claude Code"
          git push

      - name: Summary
        run: |
          echo "## TeamCity Coverage Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "✅ Coverage data updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes to coverage data" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Data" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat scorecard/teamcity-coverage.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-scorecard:
    runs-on: ubuntu-latest
    needs: refresh-teamcity-coverage
    if: ${{ always() && github.event.inputs.skip_scorecard != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Get latest including any TeamCity coverage commit

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build scorecard from GitHub repos
        env:
          GH_TOKEN: ${{ secrets.ZOCDOC_REPO_TOKEN }}
        run: |
          python3 scripts/build-scorecard.py --use-github

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scorecard/data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scorecard/data.json
          git commit -m "chore: refresh scorecard data from GitHub

          Generated with AI

          Co-Authored-By: Claude Code"
          git push

      - name: Summary
        run: |
          echo "## Scorecard Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "✅ Scorecard data updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes to scorecard data" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View scorecard: https://rashmi-srivastava-zocdoc.github.io/team-management/scorecard.html" >> $GITHUB_STEP_SUMMARY
